# Workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Scheduled rebuilds for future-dated posts are dispatched by the
  # Cloudflare Worker `build-trigger` (every 3 hours), which calls
  # workflow_dispatch below. Worker source: social-automation/build-trigger/
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && echo "c89632f5bd7727746df2560313dc5dbeebef0a8823566c6479dbdd3c4f06aad9  ${{ runner.temp }}/hugo.deb" | sha256sum -c \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Setup IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -n "$INDEXNOW_KEY" ] && [ ${#INDEXNOW_KEY} -ge 8 ]; then
            echo "$INDEXNOW_KEY" > "./public/${INDEXNOW_KEY}.txt"
          else
            echo "::warning::INDEXNOW_KEY secret not set or invalid, skipping verification file"
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Purge Cloudflare Cache
        if: success()
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Notify social posters
        if: success() && github.event_name == 'push'
        env:
          SOCIAL_API_SECRET: ${{ secrets.SOCIAL_API_SECRET }}
          BLUESKY_TRIGGER_URL: ${{ secrets.BLUESKY_TRIGGER_URL }}
          TWITTER_TRIGGER_URL: ${{ secrets.TWITTER_TRIGGER_URL }}
        run: |
          curl -X POST -H "Authorization: Bearer $SOCIAL_API_SECRET" \
            --max-time 10 --retry 2 \
            "$BLUESKY_TRIGGER_URL" || echo "bluesky webhook returned non-zero (fire-and-forget)"
          curl -X POST -H "Authorization: Bearer $SOCIAL_API_SECRET" \
            --max-time 10 --retry 2 \
            "$TWITTER_TRIGGER_URL" || echo "twitter webhook returned non-zero (fire-and-forget)"
