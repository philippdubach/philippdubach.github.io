# Sidebar navigation. Two groups so the rail keeps its editorial restraint
# while still surfacing the topical hubs that AI crawlers need: leaf posts
# can only reach /categories/ via inline chips today, and /faq/ has no
# persistent surface at all. The visual separator between groups is a
# hairline rule, not a heading — see sidebar.html / custom.css.
main:
  - name: "Articles"
    url: "/"
  - name: "Projects"
    url: "/projects/"
  - name: "Research"
    url: "/research/"
  - name: "About"
    url: "/about/"
secondary:
  - name: "Categories"
    url: "/categories/"
  - name: "FAQ"
    url: "/faq/"
  - name: "Subscribe"
    url: "/subscribe/"
